services:
  postgres:
    image: postgres:16-alpine
    container_name: paperclue-postgres
    environment:
      POSTGRES_USER: paperclue
      POSTGRES_PASSWORD: paperclue
      POSTGRES_DB: paperclue
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclue"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: paperclue-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # FastAPI research backend. The Next.js frontend runs separately via
  # `npm run dev` in ./frontend and proxies to this over BACKEND_API_URL
  # (see frontend/next.config.ts) — it is not containerised here.
  api:
    build: ./backend
    container_name: paperclue-api
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      STORAGE_DIR: /data/pdfs
    volumes:
      - pdf_data:/data/pdfs
      - embed_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:
  pdf_data:
  embed_cache:
